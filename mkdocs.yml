site_name: wav2tidal
site_description: Learn musical style from WAV corpora and drive TidalCycles live
repo_url: https://github.com/lambdasistemi/wav2tidal
theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
plugins:
  - search
  - mermaid2
nav:
  - Home: index.md
  - The big idea: guide.md
  - Architecture: architecture.md
  - Sound engine: sound-engine.md
  - Language: language.md
  - Model: model.md
  - Roadmap: roadmap.md
