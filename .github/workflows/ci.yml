name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build gate — populates the shared nix store (default CPU shell only;
  # never the ROCm training shell). Branch protection requires "Build Gate".
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build dev shell + checks
        run: >-
          nix build --quiet
          .#devShells.x86_64-linux.default.inputDerivation
          .#checks.x86_64-linux.ci

  ci:
    name: Lint + Test
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: just ci
        run: nix develop --quiet -c just ci
